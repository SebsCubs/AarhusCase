# Skoven building configuration
building: skoven
bms_source: skoven  # uses its own BMS export

# Zones (update once Viben-to-room mapping is confirmed)
# Currently: 3-zone fallback (core, floor0, floor1)
# 1-floor building, 4 rooms. Each room is adjacent to two other rooms (a ring)
# and exposed to the outdoor. Rooms map 1:1 to ReMoni sensors viben8/9/10/11
# (the metric_sensors_8_9_10_11.csv "Skoven" sensors). Room->sensor assignment
# is provisional pending the floor plan.
zones:
  room_a:
    outdoor_exposed: true
    adjacent_to: [room_b, room_d]
    nominal_air_flow_kgs: 0.05
    sensor_slugs: ["viben8"]
  room_b:
    outdoor_exposed: true
    adjacent_to: [room_c, room_a]
    nominal_air_flow_kgs: 0.05
    sensor_slugs: ["viben9"]
  room_c:
    outdoor_exposed: true
    adjacent_to: [room_d, room_b]
    nominal_air_flow_kgs: 0.05
    sensor_slugs: ["viben10"]
  room_d:
    outdoor_exposed: true
    adjacent_to: [room_a, room_c]
    nominal_air_flow_kgs: 0.05
    sensor_slugs: ["viben11"]

# BMS file path (relative to repo root Jettesvej2Brabrand/PredictiveOptimalControlAarhus/)
bms_file: "Jettesvej 10ASkoven-144523-30.3.2026.csv.xlsx"

# Meter assignments — PROVISIONAL (meter_matcher.py best correlation vs Skoven
# BMS proxy was weak, r=0.31, because BMS is 6-hourly over a spring overlap).
# Confirm against the building's actual heat/electricity meter IDs.
varme_meter_id: "5344947"   # provisional: clearest space-heating signature
                            # (Jan 0.9 kW, ~0 in Apr/May, negative outdoor corr)
el_meter_id: "19591181"     # provisional (most active EL meter)

# Estimation windows. Stage 1 (envelope) uses a cold window where ReMoni +
# meters overlap; Stage 2 (hydronic) needs BMS water signals (BMS starts
# 2025-03-30) so it uses the BMS-meter overlap. Meters end 2025-05-31.
envelope_start: "2025-01-15"
envelope_end: "2025-01-22"
# Hydronic stage now uses a real WINTER window: BMS water signals run to
# 2026-03-30, and Jan-2026 shows a proper heating regime (T_sup ~50 °C,
# T_ret ~36 °C, dT ~14 °C) that makes the radiator UA/flow genuinely
# identifiable — unlike the earlier low-heat spring overlap (dT ~1 °C). The
# heat meter ends 2025-05-31, so this window targets return-water + zone temps
# (ReMoni runs to 2026-04), not the varme power.
hydronic_start: "2026-01-08"
hydronic_end: "2026-01-15"
# Data export window spans the Stage-1 envelope (Jan 2025) and the Stage-2
# winter hydronic (Jan 2026) windows, widened to cover the RL train+eval
# windows below (sim mode only reads outdoor_temperature/global_irradiation,
# both independent of the BMS/ReMoni/meter coverage limits — see
# data_ingest/unify.py — so this range is set by the RL windows, not by
# instrumentation availability).
export_start: "2024-06-01"
export_end: "2026-06-01"
# RL windows (calibrated-model simulation; sim mode only needs the weather
# boundary CSVs, so these just need to sit inside export_start/export_end).
# Disjoint train/eval split: eval covers the real Jan-2026 winter used for
# Stage-2 hydronic calibration, so RL-vs-baseline results are directly
# comparable to the calibrated operating point.
train_start: "2024-12-01"
train_end: "2025-11-01"
eval_start: "2025-12-01"
eval_end: "2026-05-15"

# Radiator nominal parameters (initial guess; refined by Stage 2)
radiator:
  Q_flow_nominal_sh: 1500.0
  T_a_nominal_sh: 55.0
  T_b_nominal_sh: 45.0
  TAir_nominal_sh: 21.0
  thermalMassHeatCapacity: 5000.0

# ECL310 heating curve initial guess (refined by Stage 2)
heating_curve:
  s: 1.5
  b: 35.0
  delta: 0.0
  T_min: 20.0
  T_max: 80.0
